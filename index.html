<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy vs Rent Calculator · 买房 vs 租房</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f1efe8;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --text: #1a1a1a; --text2: #6b6a66; --text3: #999894;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #C0DD97; --green-dark: #27500A;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #F7C1C1; --red-dark: #791F1F;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-border: #B5D4F4;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; margin: 0 auto; }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
  .stl { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .field label span { font-weight: 600; color: var(--text); }
  input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--surface2); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text); cursor: pointer; border: 2px solid var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .toggle-btn { flex: 1; padding: 6px 0; font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; }
  .toggle-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; }
  .result-box { border-radius: var(--radius); padding: 14px 16px; text-align: center; margin-bottom: 12px; }
  .result-box .rl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .result-box .rv { font-size: 28px; font-weight: 700; margin-bottom: 2px; }
  .result-box .rs { font-size: 11px; }
  .sr { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .sr:last-child { border-bottom: none; }
  .sr .lbl { color: var(--text2); }
  .sr .val { font-weight: 500; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 6px 0; }
  .sr.tot .lbl, .sr.tot .val { font-weight: 700; color: var(--text); }
  .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .mini { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .mini .ml { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .mini .mv { font-size: 15px; font-weight: 600; }
  .cf-bar { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .cf-track { flex: 1; height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
  .cf-fill { height: 100%; border-radius: 3px; transition: width .2s, background .2s; }
  .sep { border: none; border-top: 1.5px solid var(--border); margin: 6px 0 14px; }
  .compare-banner { border-radius: var(--radius); padding: 16px 18px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; border: 0.5px solid var(--border); margin-top: 4px; }
  .cb-side { text-align: center; }
  .cb-side .cl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .cb-side .cv { font-size: 22px; font-weight: 700; }
  .cb-side .cs { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .cb-mid { text-align: center; }
  .cb-mid .cml { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
  .cb-mid .cmv { font-size: 18px; font-weight: 700; }
  .cb-mid .cmw { font-size: 11px; font-weight: 600; margin-top: 2px; }
  .neg { color: var(--red); } .pos { color: var(--green); }
  .note { font-size: 11px; color: var(--text2); margin-top: 6px; line-height: 1.6; }
  footer { text-align: center; margin-top: 32px; font-size: 11px; color: var(--text3); }
  .lang-toggle { position: fixed; top: 16px; right: 16px; display: flex; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; z-index: 999; background: var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .lang-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; }
  .lang-btn.active { background: var(--text); color: #fff; }
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div style="max-width:1100px;margin:0 auto;">
  <h1 id="t-title"></h1>
  <p class="subtitle" id="t-subtitle"></p>

  <div class="layout">
    <!-- LEFT -->
    <div>
      <div class="card">
        <p class="stl" id="t-s1"></p>
        <div class="field"><label><span id="t-price"></span><span id="lbl-price">$500,000</span></label>
          <input type="range" min="300000" max="900000" step="5000" value="500000" oninput="s('price',this.value)"></div>
        <div class="field"><label><span id="t-down"></span><span id="lbl-down">20%</span></label>
          <input type="range" min="5" max="50" step="1" value="20" oninput="s('down',this.value)"></div>
        <div class="field"><label><span id="t-rate"></span><span id="lbl-rate">4.5%</span></label>
          <input type="range" min="2.0" max="8.0" step="0.1" value="4.5" oninput="s('rate',this.value)"></div>
        <div class="field"><label><span id="t-amort"></span><span id="lbl-amort"></span></label>
          <input type="range" min="15" max="30" step="5" value="25" oninput="s('amort',this.value)"></div>
        <div class="field"><label><span id="t-term"></span><span id="lbl-term"></span></label>
          <input type="range" min="1" max="10" step="1" value="5" oninput="s('term',this.value)"></div>
      </div>

      <div class="card">
        <p class="stl" id="t-s2"></p>
        <div class="field"><label><span id="t-condo"></span><span id="lbl-condo">$800</span></label>
          <input type="range" min="300" max="1500" step="25" value="800" oninput="s('condo',this.value)"></div>
        <div class="field"><label><span id="t-tax"></span><span id="lbl-tax">$4,000</span></label>
          <input type="range" min="2000" max="8000" step="100" value="4000" oninput="s('tax',this.value)"></div>
        <div class="field"><label><span id="t-closing"></span><span id="lbl-closing">$10,000</span></label>
          <input type="range" min="0" max="60000" step="1000" value="10000" oninput="s('closing',this.value)"></div>
      </div>

      <div class="card">
        <p class="stl" id="t-s3"></p>
        <div class="field"><label><span id="t-rent"></span><span id="lbl-rent">$2,600</span></label>
          <input type="range" min="0" max="5000" step="50" value="2600" oninput="s('rent',this.value)"></div>
        <div class="field"><label><span id="t-growth"></span><span id="lbl-growth">5.0%</span></label>
          <input type="range" min="-5" max="15" step="0.5" value="5" oninput="s('growth',this.value)"></div>
        <div class="field"><label><span id="t-agent"></span><span id="lbl-agent">4.0%</span></label>
          <input type="range" min="0" max="6" step="0.5" value="4" oninput="s('agent',this.value)"></div>
        <div class="toggle-row">
          <button class="toggle-btn active" id="btn-sell" onclick="setExit('sell')"></button>
          <button class="toggle-btn" id="btn-hold" onclick="setExit('hold')"></button>
        </div>
      </div>

      <div class="card">
        <p class="stl" id="t-s4"></p>
        <div class="field"><label><span id="t-rrent"></span><span id="lbl-rrent">$2,800</span></label>
          <input type="range" min="500" max="5000" step="50" value="2800" oninput="s('rrent',this.value)"></div>
        <div class="field"><label><span id="t-irr"></span><span id="lbl-irr">8.0%</span></label>
          <input type="range" min="1" max="15" step="0.5" value="8" oninput="s('irr',this.value)"></div>
        <p class="note" id="t-rent-note"></p>
      </div>
    </div>

    <!-- RIGHT -->
    <div>
      <div id="buy-result" class="result-box"></div>

      <div class="card">
        <p class="stl" id="t-cf-title"></p>
        <div class="sr"><span class="lbl" id="t-cf-income"></span><span class="val pos" id="r-income"></span></div>
        <div class="sr"><span class="lbl" id="t-cf-mp"></span><span class="val neg" id="r-mp"></span></div>
        <div class="sr"><span class="lbl" id="t-cf-condo"></span><span class="val neg" id="r-condo-out"></span></div>
        <div class="sr"><span class="lbl" id="t-cf-tax"></span><span class="val neg" id="r-tax-out"></span></div>
        <hr class="divider">
        <div class="sr tot"><span class="lbl" id="t-cf-net"></span><span class="val" id="r-cf"></span></div>
        <div class="cf-bar"><div class="cf-track"><div class="cf-fill" id="cf-fill"></div></div>
          <span id="cf-label" style="font-size:11px;color:var(--text2);white-space:nowrap;"></span></div>
      </div>

      <div class="card">
        <p class="stl" id="t-buy-breakdown"></p>
        <div class="sr"><span class="lbl" id="t-bd-closing"></span><span class="val neg" id="b-closing"></span></div>
        <div class="sr"><span class="lbl" id="t-bd-interest"></span><span class="val neg" id="b-interest"></span></div>
        <div class="sr"><span class="lbl" id="t-bd-condo"></span><span class="val neg" id="b-condo"></span></div>
        <div class="sr"><span class="lbl" id="t-bd-tax"></span><span class="val neg" id="b-tax-tot"></span></div>
        <div class="sr"><span class="lbl" id="b-sell-lbl"></span><span class="val neg" id="b-sell"></span></div>
        <div class="sr"><span class="lbl" id="t-bd-rentincome"></span><span class="val pos" id="b-rent-in"></span></div>
        <hr class="divider">
        <div class="sr tot"><span class="lbl" id="t-bd-netcost"></span><span class="val" id="b-net"></span></div>
      </div>

      <div class="card">
        <p class="stl" id="t-snapshot"></p>
        <div class="mini-grid">
          <div class="mini"><p class="ml" id="t-sn-hv"></p><p class="mv" id="s-hv"></p></div>
          <div class="mini"><p class="ml" id="t-sn-bal"></p><p class="mv neg" id="s-bal"></p></div>
          <div class="mini"><p class="ml" id="t-sn-prin"></p><p class="mv pos" id="s-prin"></p></div>
          <div class="mini"><p class="ml" id="t-sn-eq"></p><p class="mv" id="s-eq"></p></div>
        </div>
      </div>

      <hr class="sep">

      <div id="rent-result" class="result-box"></div>

      <div class="card">
        <p class="stl" id="t-rent-breakdown"></p>
        <div class="sr"><span class="lbl" id="t-rb-init"></span><span class="val" id="rr-init"></span></div>
        <div class="sr"><span class="lbl" id="t-rb-extra"></span><span class="val" id="rr-extra"></span></div>
        <div class="sr"><span class="lbl" id="t-rb-gain"></span><span class="val pos" id="rr-gain"></span></div>
        <hr class="divider">
        <div class="sr"><span class="lbl" id="t-rb-portfolio"></span><span class="val pos" id="rr-portfolio"></span></div>
        <div class="sr"><span class="lbl" id="t-rb-rent"></span><span class="val neg" id="rr-rent"></span></div>
        <hr class="divider">
        <div class="sr tot"><span class="lbl" id="t-rb-final"></span><span class="val" id="rr-final"></span></div>
        <p class="note" id="rr-note"></p>
      </div>

      <hr class="sep">

      <div class="compare-banner" id="compare-banner">
        <div class="cb-side">
          <p class="cl" style="color:var(--blue);" id="t-cmp-buy-label"></p>
          <p class="cv" id="cmp-buy"></p>
          <p class="cs" id="t-cmp-buy-sub"></p>
        </div>
        <div class="cb-mid">
          <p class="cml" id="t-cmp-gap-label"></p>
          <p class="cmv" id="cmp-gap"></p>
          <p class="cmw" id="cmp-winner"></p>
        </div>
        <div class="cb-side">
          <p class="cl" style="color:var(--green);" id="t-cmp-rent-label"></p>
          <p class="cv" id="cmp-rent"></p>
          <p class="cs" id="t-cmp-rent-sub"></p>
        </div>
      </div>
    </div>
  </div>
  <footer id="t-footer"></footer>
</div>

<script>
// ── Translations ──
const T = {
  zh: {
    title: '买房 vs 租房 计算器',
    subtitle: '调整左侧参数，右侧实时显示期末净盈亏对比',
    s1: '房产参数', s2: '持有成本', s3: '收入 · 退出 · 涨幅', s4: '租房对比参数',
    price: '买入价格', down: '首付比例', rate: '贷款利率',
    amort: '摊还年限', amortUnit: '年',
    term: '持有年限', termUnit: '年',
    condo: '物业费 / 月', tax: '地税 / 年', closing: '购房杂费（律师 / HST 等）',
    rent: '月租金收入（0 = 自住）', growth: '房价年涨幅', agent: '卖出经纪费率',
    sellBtn: '期末卖出', holdBtn: '期末持有',
    rrent: '租房月租金', irr: '投资年化收益率',
    rentNote: '首付全额投入，每月买房比租房多花的差额也追加投入，按年化复利计算。',
    cfTitle: '月现金流（买房）',
    cfIncome: '租金收入', cfMp: '月供', cfCondo: '物业费', cfTax: '地税 / 月', cfNet: '月净现金流',
    posFlow: '正现金流', negFlow: '月均倒贴',
    buyBreakdown: '买房期末拆解',
    bdClosing: '购房杂费', bdInterest: '利息总计', bdCondo: '物业费总计',
    bdTax: '地税总计', bdSell: '卖出费用（经纪+律师）', bdNoSell: '卖出费用',
    bdRentIncome: '租金收入', bdNetCost: '净持有成本',
    snapshot: '买房期末快照',
    snHv: '期末房价', snBal: '剩余贷款', snPrin: '已还本金', snEq: '净资产',
    rentBreakdown: '租房期末拆解',
    rbInit: '初始投入（首付，进入组合）', rbExtra: '月差额追加投入（累计）',
    rbGain: '投资复利收益', rbPortfolio: '投资组合总值',
    rbRent: '累计租金支出', rbFinal: '净盈亏（组合 − 租金）',
    cmpBuyLabel: '买房净盈亏', cmpBuySub: '扣首付 + 杂费 + 持有成本',
    cmpGapLabel: '差距', cmpRentLabel: '租房净盈亏', cmpRentSub: '组合总值 − 累计租金',
    rentLeads: '租房领先', buyLeads: '买房领先',
    profit: '盈利', loss: '亏损',
    buyLabel: '买房', rentLabel: '租房',
    sellMode: '卖出', holdMode: '持有',
    selfOccupy: '自住（$0）',
    noExtra: '$0（租房月支出更高）',
    footer: '仅供参考，不构成投资建议 · 数字均为税前估算',
    extraNote: (diff, down, irr) => `买房每月支出比租房多 ${diff}，差额每月追加投入，连同首付 ${down} 按 ${irr}% 复利增长。`,
    noExtraNote: (rrent, out) => `租房月租（${rrent}）≥ 买房月支出（${out}），无差额可追加，仅首付按年化复利增长。`,
    buyResultSub: (exit, term, growth, hv) => `${exit==='sell'?'卖出':'持有'} · ${term}年 · 涨${growth}%/年 · 期末房价 ${hv}`,
    rentResultSub: (irr, term, port, rent) => `${irr}%年化 · ${term}年 · 组合 ${port} − 租金 ${rent}`,
  },
  en: {
    title: 'Buy vs Rent Calculator',
    subtitle: 'Adjust inputs on the left — see end-of-term P&L update instantly on the right',
    s1: 'Property', s2: 'Holding Costs', s3: 'Income · Exit · Appreciation', s4: 'Rent Comparison',
    price: 'Purchase Price', down: 'Down Payment', rate: 'Mortgage Rate',
    amort: 'Amortization', amortUnit: ' yrs',
    term: 'Holding Period', termUnit: ' yrs',
    condo: 'Condo Fee / mo', tax: 'Property Tax / yr', closing: 'Closing Costs (lawyer, HST, etc.)',
    rent: 'Rental Income / mo (0 = owner-occupied)', growth: 'Annual Price Appreciation', agent: 'Agent Fee on Sale',
    sellBtn: 'Sell at End', holdBtn: 'Hold at End',
    rrent: 'Monthly Rent (if renting)', irr: 'Investment Annual Return',
    rentNote: 'Down payment is fully invested. Any monthly savings vs buying are also reinvested and compounded.',
    cfTitle: 'Monthly Cash Flow (Buy)',
    cfIncome: 'Rental Income', cfMp: 'Mortgage Payment', cfCondo: 'Condo Fee', cfTax: 'Property Tax / mo', cfNet: 'Net Monthly Cash Flow',
    posFlow: 'Positive cash flow', negFlow: 'Monthly shortfall',
    buyBreakdown: 'Buy — End-of-Term Breakdown',
    bdClosing: 'Closing Costs', bdInterest: 'Total Interest', bdCondo: 'Total Condo Fees',
    bdTax: 'Total Property Tax', bdSell: 'Sale Costs (agent + lawyer)', bdNoSell: 'Sale Costs',
    bdRentIncome: 'Rental Income', bdNetCost: 'Net Holding Cost',
    snapshot: 'Buy — End-of-Term Snapshot',
    snHv: 'Property Value', snBal: 'Remaining Mortgage', snPrin: 'Principal Paid', snEq: 'Equity',
    rentBreakdown: 'Rent — End-of-Term Breakdown',
    rbInit: 'Initial Investment (= down payment)', rbExtra: 'Monthly savings reinvested (total)',
    rbGain: 'Compound Investment Return', rbPortfolio: 'Total Portfolio Value',
    rbRent: 'Total Rent Paid', rbFinal: 'Net P&L (Portfolio − Rent)',
    cmpBuyLabel: 'Buy Net P&L', cmpBuySub: 'After down payment, costs & fees',
    cmpGapLabel: 'Gap', cmpRentLabel: 'Rent Net P&L', cmpRentSub: 'Portfolio − total rent paid',
    rentLeads: 'Renting wins', buyLeads: 'Buying wins',
    profit: 'Profit', loss: 'Loss',
    buyLabel: 'Buy', rentLabel: 'Rent',
    sellMode: 'Sell', holdMode: 'Hold',
    selfOccupy: 'Owner-occupied ($0)',
    noExtra: '$0 (rent ≥ buy costs)',
    footer: 'For illustrative purposes only. Not financial advice. Pre-tax estimates.',
    extraNote: (diff, down, irr) => `Buying costs ${diff}/mo more than renting. That difference is reinvested monthly alongside the ${down} down payment at ${irr}% p.a.`,
    noExtraNote: (rrent, out) => `Monthly rent (${rrent}) ≥ total buy costs (${out}). No surplus to reinvest — only the down payment compounds.`,
    buyResultSub: (exit, term, growth, hv) => `${exit==='sell'?'Sell':'Hold'} · ${term}yr · +${growth}%/yr · End value ${hv}`,
    rentResultSub: (irr, term, port, rent) => `${irr}% p.a. · ${term}yr · Portfolio ${port} − Rent ${rent}`,
  }
};

let lang = 'zh';

function setLang(l) {
  lang = l;
  document.getElementById('btn-zh').classList.toggle('active', l==='zh');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  applyTranslations();
  calc();
}

function applyTranslations() {
  const t = T[lang];
  const set = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  set('t-title', t.title); set('t-subtitle', t.subtitle);
  set('t-s1', t.s1); set('t-s2', t.s2); set('t-s3', t.s3); set('t-s4', t.s4);
  set('t-price', t.price); set('t-down', t.down); set('t-rate', t.rate);
  set('t-amort', t.amort); set('t-term', t.term);
  set('t-condo', t.condo); set('t-tax', t.tax); set('t-closing', t.closing);
  set('t-rent', t.rent); set('t-growth', t.growth); set('t-agent', t.agent);
  set('btn-sell', t.sellBtn); set('btn-hold', t.holdBtn);
  set('t-rrent', t.rrent); set('t-irr', t.irr); set('t-rent-note', t.rentNote);
  set('t-cf-title', t.cfTitle); set('t-cf-income', t.cfIncome); set('t-cf-mp', t.cfMp);
  set('t-cf-condo', t.cfCondo); set('t-cf-tax', t.cfTax); set('t-cf-net', t.cfNet);
  set('t-buy-breakdown', t.buyBreakdown);
  set('t-bd-closing', t.bdClosing); set('t-bd-interest', t.bdInterest);
  set('t-bd-condo', t.bdCondo); set('t-bd-tax', t.bdTax);
  set('t-bd-rentincome', t.bdRentIncome); set('t-bd-netcost', t.bdNetCost);
  set('t-snapshot', t.snapshot);
  set('t-sn-hv', t.snHv); set('t-sn-bal', t.snBal); set('t-sn-prin', t.snPrin); set('t-sn-eq', t.snEq);
  set('t-rent-breakdown', t.rentBreakdown);
  set('t-rb-init', t.rbInit); set('t-rb-extra', t.rbExtra); set('t-rb-gain', t.rbGain);
  set('t-rb-portfolio', t.rbPortfolio); set('t-rb-rent', t.rbRent); set('t-rb-final', t.rbFinal);
  set('t-cmp-buy-label', t.cmpBuyLabel); set('t-cmp-buy-sub', t.cmpBuySub);
  set('t-cmp-gap-label', t.cmpGapLabel);
  set('t-cmp-rent-label', t.cmpRentLabel); set('t-cmp-rent-sub', t.cmpRentSub);
  set('t-footer', t.footer);
  // update lbl-amort and lbl-term units
  const lAmort = document.getElementById('lbl-amort');
  if(lAmort) lAmort.textContent = ST.amort + t.amortUnit;
  const lTerm = document.getElementById('lbl-term');
  if(lTerm) lTerm.textContent = ST.term + t.termUnit;
}

// ── State ──
const ST = {
  price:500000, down:20, rate:4.5, amort:25, term:5,
  condo:800, tax:4000, closing:10000,
  rent:2600, growth:5.0, agent:4.0, exit:'sell',
  rrent:2800, irr:8.0
};

function fmtP(n){ return '$'+Math.abs(Math.round(n)).toLocaleString('en-CA'); }
function fmt(n){ return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString('en-CA'); }

function s(key, val) {
  ST[key] = parseFloat(val);
  const t = T[lang];
  const lbl = document.getElementById('lbl-'+key);
  if (!lbl) return;
  const map = {
    price: fmtP(val), down: val+'%', rate: parseFloat(val).toFixed(1)+'%',
    amort: val+t.amortUnit, term: val+t.termUnit,
    condo: fmtP(val), tax: fmtP(val), closing: fmtP(val),
    rent: val==0 ? t.selfOccupy : fmtP(val),
    growth: parseFloat(val).toFixed(1)+'%', agent: parseFloat(val).toFixed(1)+'%',
    rrent: fmtP(val), irr: parseFloat(val).toFixed(1)+'%'
  };
  if (map[key] !== undefined) lbl.textContent = map[key];
  calc();
}

function setExit(mode) {
  ST.exit = mode;
  document.getElementById('btn-sell').classList.toggle('active', mode==='sell');
  document.getElementById('btn-hold').classList.toggle('active', mode==='hold');
  calc();
}

function calc() {
  const t = T[lang];
  const {price,down,rate,amort,term,condo,tax,closing,rent,growth,agent,exit,rrent,irr} = ST;
  const downAmt = Math.round(price*down/100);
  const loan = price - downAmt;
  const mRate = rate/100/12;
  const nTerm = term*12;
  const nAmort = amort*12;

  const mp = loan>0&&mRate>0 ? loan*mRate/(1-Math.pow(1+mRate,-nAmort)) : loan/nAmort;
  const mpR = Math.round(mp);

  let bal=loan, totI=0, totP=0;
  for(let i=0;i<nTerm;i++){
    const interest=bal*mRate, principal=mp-interest;
    totI+=interest; totP+=Math.min(principal,bal); bal=Math.max(bal-principal,0);
  }
  const finalBal=Math.round(bal); totI=Math.round(totI); totP=Math.round(totP);

  const houseVal=Math.round(price*Math.pow(1+growth/100,term));
  const agentFee=exit==='sell'?Math.round(houseVal*agent/100):0;
  const sellMisc=exit==='sell'?1500:0;
  const totalSellCost=agentFee+sellMisc;
  const totalRentIn=rent*nTerm;
  const totalCondo=condo*nTerm;
  const totalTaxTot=Math.round(tax/12*nTerm);
  const burnHolding=closing+totI+totalCondo+totalTaxTot;
  const netHolding=burnHolding-totalRentIn;
  const mCF=Math.round(rent-mp-condo-tax/12);

  const buyPnl = exit==='sell'
    ? Math.round((houseVal-totalSellCost-finalBal)-downAmt-netHolding)
    : Math.round((houseVal-finalBal)-downAmt-netHolding);

  // Rent scenario
  const mIRR=Math.pow(1+irr/100,1/12)-1;
  let portfolio=downAmt, totalExtra=0, totalGain=0;
  const buyMonthlyOut=mp+condo+tax/12;
  for(let i=0;i<nTerm;i++){
    const before=portfolio; portfolio*=(1+mIRR); totalGain+=portfolio-before;
    const saving=buyMonthlyOut-rrent;
    if(saving>0){portfolio+=saving; totalExtra+=saving;}
  }
  const rentPortfolio=Math.round(portfolio); totalGain=Math.round(totalGain);
  const totalRrentOut=rrent*nTerm;
  const rentNetPnl=Math.round(rentPortfolio-totalRrentOut);

  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  const setC = (id,col) => { const el=document.getElementById(id); if(el) el.style.color=col; };

  // Buy result box
  const bc=buyPnl>=0?'var(--green)':'var(--red)';
  const bdc=buyPnl>=0?'var(--green-dark)':'var(--red-dark)';
  document.getElementById('buy-result').style.cssText=`background:${buyPnl>=0?'var(--green-bg)':'var(--red-bg)'};border:0.5px solid ${buyPnl>=0?'var(--green-border)':'var(--red-border)'};border-radius:var(--radius);padding:14px 16px;text-align:center;margin-bottom:12px;`;
  document.getElementById('buy-result').innerHTML=`
    <p class="rl" style="color:${bc};">${t.buyLabel} · ${t.buyResultSub(exit,term,growth.toFixed(1),fmtP(houseVal))}</p>
    <p class="rv" style="color:${bdc};">${fmt(buyPnl)}</p>
    <p class="rs" style="color:${bc};">${buyPnl>=0?t.profit:t.loss}</p>`;

  // Monthly CF
  set('r-income', rent>0?'+'+fmtP(rent):t.selfOccupy);
  set('r-mp', '−'+fmtP(mpR));
  set('r-condo-out', '−'+fmtP(condo));
  set('r-tax-out', '−'+fmtP(Math.round(tax/12)));
  set('r-cf', fmt(mCF)+'/mo');
  setC('r-cf', mCF>=0?'var(--green)':'var(--red)');
  const fill=document.getElementById('cf-fill');
  fill.style.width=Math.min(Math.abs(mCF)/Math.max(Math.abs(mCF),1500)*100,100)+'%';
  fill.style.background=mCF>=0?'var(--green)':'var(--red)';
  set('cf-label', mCF>=0?t.posFlow:t.negFlow);

  // Buy breakdown
  set('b-closing','−'+fmtP(closing));
  set('b-interest','−'+fmtP(totI));
  set('b-condo','−'+fmtP(totalCondo));
  set('b-tax-tot','−'+fmtP(totalTaxTot));
  set('b-sell-lbl', exit==='sell'?t.bdSell:t.bdNoSell);
  set('b-sell', exit==='sell'?'−'+fmtP(totalSellCost):'$0');
  set('b-rent-in', totalRentIn>0?'+'+fmtP(totalRentIn):'$0');
  const netTot=netHolding+(exit==='sell'?totalSellCost:0);
  set('b-net', fmt(netTot));
  setC('b-net', netTot<=0?'var(--green)':'var(--red)');

  // Snapshot
  set('s-hv', fmtP(houseVal)); set('s-bal', fmtP(finalBal));
  set('s-prin', '+'+fmtP(totP));
  set('s-eq', fmtP(houseVal-finalBal));
  setC('s-eq', houseVal-finalBal>=0?'var(--green)':'var(--red)');

  // Rent result box
  const rc=rentNetPnl>=0?'var(--green)':'var(--red)';
  const rdc=rentNetPnl>=0?'var(--green-dark)':'var(--red-dark)';
  document.getElementById('rent-result').style.cssText=`background:${rentNetPnl>=0?'var(--green-bg)':'var(--red-bg)'};border:0.5px solid ${rentNetPnl>=0?'var(--green-border)':'var(--red-border)'};border-radius:var(--radius);padding:14px 16px;text-align:center;margin-bottom:12px;`;
  document.getElementById('rent-result').innerHTML=`
    <p class="rl" style="color:${rc};">${t.rentLabel} · ${t.rentResultSub(irr.toFixed(1),term,fmtP(rentPortfolio),fmtP(totalRrentOut))}</p>
    <p class="rv" style="color:${rdc};">${fmt(rentNetPnl)}</p>
    <p class="rs" style="color:${rc};">${rentNetPnl>=0?t.profit:t.loss}</p>`;

  // Rent breakdown
  set('rr-init', fmtP(downAmt));
  const extraEl=document.getElementById('rr-extra');
  if(totalExtra>0){ extraEl.textContent='+'+fmtP(Math.round(totalExtra)); extraEl.style.color='var(--green)'; }
  else { extraEl.textContent=t.noExtra; extraEl.style.color='var(--text2)'; }
  set('rr-gain', '+'+fmtP(totalGain));
  set('rr-portfolio', fmtP(rentPortfolio));
  set('rr-rent', '−'+fmtP(totalRrentOut));
  set('rr-final', fmt(rentNetPnl));
  setC('rr-final', rentNetPnl>=0?'var(--green)':'var(--red)');
  set('rr-note', totalExtra>0
    ? t.extraNote(fmtP(Math.round(totalExtra/nTerm)), fmtP(downAmt), irr.toFixed(1))
    : t.noExtraNote(fmtP(rrent), fmtP(mpR+condo+Math.round(tax/12))));

  // Compare banner
  const diff=rentNetPnl-buyPnl, rentWins=diff>0;
  set('cmp-buy', fmt(buyPnl)); setC('cmp-buy', buyPnl>=0?'var(--blue)':'var(--red)');
  set('cmp-rent', fmt(rentNetPnl)); setC('cmp-rent', rentNetPnl>=0?'var(--green)':'var(--red)');
  set('cmp-gap', fmtP(Math.abs(diff))); setC('cmp-gap', rentWins?'var(--green)':'var(--blue)');
  set('cmp-winner', rentWins?t.rentLeads:t.buyLeads); setC('cmp-winner', rentWins?'var(--green)':'var(--blue)');
  const banner=document.getElementById('compare-banner');
  banner.style.background=rentWins?'var(--green-bg)':'var(--blue-bg)';
  banner.style.borderColor=rentWins?'var(--green-border)':'var(--blue-border)';
}

// Init
applyTranslations();
calc();
</script>
</body>
